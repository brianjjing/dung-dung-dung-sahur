<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Triple D — Non-kinetic, human-accountable counter-drone defense">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0B0F14"/>
      <stop offset="100%" stop-color="#0E141C"/>
    </linearGradient>
    <linearGradient id="pipeline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#27E0C8"/>
      <stop offset="50%" stop-color="#FF9E2C"/>
      <stop offset="100%" stop-color="#F0503A"/>
    </linearGradient>
    <radialGradient id="ping" cx="0.82" cy="0.30" r="0.6">
      <stop offset="0%"  stop-color="#27E0C8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#27E0C8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#ping)"/>

  <!-- HUD grid -->
  <g stroke="#2A3441" stroke-width="1" opacity="0.5">
    <line x1="0" y1="80"  x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="320"  y1="0" x2="320"  y2="320"/>
    <line x1="640"  y1="0" x2="640"  y2="320"/>
    <line x1="960"  y1="0" x2="960"  y2="320"/>
  </g>

  <!-- radar reticle, top-right -->
  <g transform="translate(1050,150)" fill="none" stroke="#27E0C8" opacity="0.55">
    <circle r="70" stroke-width="1.5"/>
    <circle r="44" stroke-width="1.5"/>
    <circle r="18" stroke-width="1.5"/>
    <line x1="-90" y1="0" x2="90" y2="0" stroke-width="1"/>
    <line x1="0" y1="-90" x2="0" y2="90" stroke-width="1"/>
  </g>
  <circle cx="1086" cy="118" r="6" fill="#F0503A"/>

  <!-- triple-chevron mark -->
  <g transform="translate(96,108)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M0 0 L36 38 L0 76"   stroke="#27E0C8"/>
    <path d="M44 0 L80 38 L44 76" stroke="#FF9E2C"/>
    <path d="M88 0 L124 38 L88 76" stroke="#F0503A"/>
  </g>

  <!-- wordmark -->
  <text x="248" y="158" font-family="'Rajdhani','Chakra Petch','Space Grotesk',sans-serif"
        font-size="84" font-weight="700" letter-spacing="3" fill="#E8EDF2">TRIPLE <tspan fill="#FF9E2C">D</tspan></text>

  <!-- pipeline subline -->
  <text x="252" y="206" font-family="'JetBrains Mono','IBM Plex Mono',monospace"
        font-size="24" letter-spacing="6" font-weight="600" fill="url(#pipeline)">DETECT &#8250; DECIDE &#8250; DEFEAT</text>

  <!-- tagline -->
  <text x="252" y="252" font-family="'Inter','IBM Plex Sans',sans-serif"
        font-size="18" fill="#5A6B7D">Non-kinetic, human-accountable counter-drone defense.</text>
</svg>
